name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff pandera dvc

      - name: Configure DVC authentication
        run: |
          dvc remote modify origin auth basic
          dvc remote modify origin user ${{ secrets.DVC_USERNAME }}
          dvc remote modify origin password ${{ secrets.DVC_PASSWORD }}

      - name: Pull DVC artifacts
        run: |
          dvc pull -r origin

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=. --cov-report=term-missing --cov-report=html --cov-fail-under=70
      - name: Data validation
        run: |
          python validation/data_validation.py

      - name: Model validation
        run: |
          python validation/model_validation.py