name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[http]==3.58.0"

      - name: Configure DVC remote credentials
        run: |
          dvc remote modify dagshub --local auth basic
          dvc remote modify dagshub --local user "${{ secrets.DAGSHUB_USERNAME }}"
          dvc remote modify dagshub --local password "${{ secrets.DAGSHUB_TOKEN }}"

      - name: Pull DVC artifacts
        run: dvc pull -v

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=. --cov-report=term-missing --cov-fail-under=70

      - name: Data validation
        run: |
          python validation/data_validation.py

      - name: Model validation
        run: |
          python validation/model_validation.py