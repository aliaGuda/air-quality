name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[http]==3.58.0"

      - name: Debug DVC configuration
        run: |
          dvc version
          dvc remote list
          dvc remote default
          dvc status -c || true

      - name: Configure DVC remote credentials
        run: |
          REMOTE_NAME=$(dvc remote default)
          echo "Using DVC remote: $REMOTE_NAME"
          dvc remote modify "$REMOTE_NAME" --local auth basic
          dvc remote modify "$REMOTE_NAME" --local user "${{ secrets.DVC_USERNAME }}"
          dvc remote modify "$REMOTE_NAME" --local password "${{ secrets.DVC_PASSWORD }}"

      - name: Pull DVC artifacts
        run: |
          REMOTE_NAME=$(dvc remote default)
          dvc pull -r "$REMOTE_NAME" --force -v
          dvc checkout --force -v

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=. --cov-report=term-missing --cov-fail-under=70

      - name: Data validation
        run: |
          python validation/data_validation.py

      - name: Model validation
        run: |
          python validation/model_validation.py