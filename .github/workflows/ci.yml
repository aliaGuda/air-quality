name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .
      CI: "true"
      MLFLOW_TRACKING_URI: http://localhost:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc dagshub

      - name: Configure DVC credentials
        env:
          DVC_USERNAME: ${{ secrets.DVC_USERNAME }}
          DVC_PASSWORD: ${{ secrets.DVC_PASSWORD }}
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user "$DVC_USERNAME"
          dvc remote modify origin --local password "$DVC_PASSWORD"
          
      - name: Pull DVC artifacts
        run: |
          dvc pull -v

      - name: Lint
        run: |
          ruff check .

      - name: Unit Tests with Coverage
        run: |
          pytest tests/ --cov=src/serving --cov-report=term-missing --cov-report=html --cov-fail-under=70
      - name: Data Validation
        run: |
          python scripts/validate_data.py

      - name: Model Validation
        run: |
          python scripts/validate_model.py

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/