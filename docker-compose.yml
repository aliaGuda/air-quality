services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: air-quality-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow/backend
      - ./mlruns:/mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/backend/mlflow.db
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5000